<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>合同风险智能审查</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #991b1b;
      --primary-light: #991b1b88;
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-secondary: #64748b;
      --success: #10b981;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; }
    .app { display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; }
    .header { padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header .badge { font-size: 11px; padding: 2px 8px; border-radius: 12px; background: #ecfdf5; color: var(--success); font-weight: 500; }
    .header .badge.error { background: #fef2f2; color: #ef4444; }
    .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .empty-state { text-align: center; color: var(--text-secondary); padding: 60px 20px; }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
    .msg { display: flex; gap: 12px; max-width: 750px; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .msg.user .msg-avatar { background: var(--primary); color: white; }
    .msg.assistant .msg-avatar { background: #f0fdf4; color: var(--success); }
    .msg-body { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.7; max-width: 600px; white-space: pre-wrap; word-break: break-word; }
    .msg.user .msg-body { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
    .msg.assistant .msg-body { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg-body pre { background: #f1f5f9; padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 13px; margin-top: 8px; }
    .msg-body .structured-result { background: #f1f5f9; padding: 12px; border-radius: 8px; font-size: 13px; margin-top: 8px; }
    .msg-body .structured-result .result-item { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .msg-body .structured-result .result-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .msg-body .structured-result .item-num { font-weight: 600; color: var(--primary); margin-right: 8px; }
    .msg-body .structured-result .field { display: flex; gap: 8px; margin-top: 4px; align-items: baseline; }
    .msg-body .structured-result .field-label { font-weight: 600; color: var(--text); min-width: 80px; flex-shrink: 0; }
    .msg-body .structured-result .field-value { color: var(--text-secondary); }
    .msg-body .structured-result code { background: #e2e8f0; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
    .msg-body code { background: #e2e8f0; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
    .msg-body strong { font-weight: 600; }
    .input-area { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--surface); }
    .input-box { display: flex; gap: 8px; align-items: flex-end; }
    .input-box textarea { flex: 1; padding: 12px 16px; border: 1px solid var(--border); border-radius: 12px; font-size: 14px; resize: none; outline: none; font-family: inherit; min-height: 44px; max-height: 200px; }
    .input-box textarea:focus { border-color: var(--primary-light); }
    .input-box button { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; white-space: nowrap; }
    .input-box button:hover { background: var(--primary-light); }
    .input-box button:disabled { opacity: 0.5; cursor: not-allowed; }
    .quick-questions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .quick-q { padding: 6px 12px; font-size: 12px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; background: var(--surface); color: var(--text-secondary); }
    .quick-q:hover { border-color: var(--primary-light); color: var(--primary); background: #f5f3ff; }
    /* Contract Samples */
    .sample-section { margin-top: 16px; text-align: left; }
    .sample-section .section-title { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 500; }
    .sample-cards { display: flex; flex-wrap: wrap; gap: 8px; }
    .sample-card { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 12px; transition: all 0.2s; background: var(--surface); max-width: 200px; }
    .sample-card:hover { border-color: var(--primary-light); background: #fef2f2; }
    .sample-card .card-title { font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .sample-card .card-tag { font-size: 11px; padding: 1px 6px; border-radius: 10px; display: inline-block; }
    .sample-card .card-tag.low { background: #ecfdf5; color: #059669; }
    .sample-card .card-tag.mid { background: #fffbeb; color: #d97706; }
    .sample-card .card-tag.high { background: #fef2f2; color: #dc2626; }
    .typing { display: inline-flex; gap: 4px; padding: 4px 0; }
    .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-secondary); animation: blink 1.4s infinite both; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }
  </style>
</head>
<body>
  <div id="app" class="app">
    <div class="header">
      <h1>合同风险智能审查</h1>
      <span class="badge" :class="{ error: !apiHealthy }">{{ apiHealthy ? '在线' : '离线' }}</span>
    </div>

    <div class="messages" ref="messagesContainer">
      <div v-if="messages.length === 0" class="empty-state">
        <div class="icon">AI</div>
        <h3 style="font-size:16px; margin-bottom:8px;">合同风险智能审查</h3>
        <p style="font-size:13px;">选择合同样本或粘贴合同文本进行风险审查</p>
        <div class="quick-questions" style="justify-content:center; margin-top:16px;">
          <span v-for="q in quickQuestions" :key="q" class="quick-q" @click="useQuick(q)">{{ q }}</span>
        </div>
        <div class="sample-section" style="margin-top:20px;">
          <div class="section-title">合同样本（点击加载）</div>
          <div class="sample-cards">
            <div v-for="s in contractSamples" :key="s.file" class="sample-card" @click="loadSample(s)">
              <div class="card-title">{{ s.title }}</div>
              <span class="card-tag" :class="s.riskClass">{{ s.risk }}</span>
            </div>
          </div>
        </div>
      </div>

      <div v-for="(msg, idx) in messages" :key="idx" class="msg" :class="msg.role">
        <div class="msg-avatar">{{ msg.role === 'user' ? '问' : 'AI' }}</div>
        <div class="msg-body" v-if="msg.role === 'user'">{{ msg.content }}</div>
        <div class="msg-body" v-else v-html="formatMessage(msg)"></div>
      </div>

      <div v-if="loading" class="msg assistant">
        <div class="msg-avatar">AI</div>
        <div class="msg-body">
          <div class="typing"><span></span><span></span><span></span></div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div v-if="messages.length > 0" style="margin-bottom:8px; display:flex; gap:6px; flex-wrap:wrap;">
        <span v-for="s in contractSamples" :key="s.file" class="sample-card" style="padding:4px 10px; max-width:none;" @click="loadSample(s)">
          <span class="card-title">{{ s.title }}</span>
          <span class="card-tag" :class="s.riskClass" style="margin-left:4px;">{{ s.risk }}</span>
        </span>
      </div>
      <div class="input-box">
        <textarea
          v-model="inputText"
          @keydown.enter.exact.prevent="sendMessage"
          placeholder="请粘贴合同文本进行风险审查..."
          rows="2"
          :disabled="loading"
        ></textarea>
        <button @click="sendMessage" :disabled="loading || !inputText.trim()">发送</button>
      </div>
    </div>
  </div>

  <script>
  const { createApp, ref, onMounted, nextTick } = Vue;

  createApp({
    setup() {
      const API_BASE = window.location.origin + '/api';
      const messages = ref([]);
      const inputText = ref('');
      const loading = ref(false);
      const apiHealthy = ref(false);
      const messagesContainer = ref(null);
      const quickQuestions = ['甲方应在合同签订后7日内支付全部款项，乙方不承担逾期交付责任', '本合同项下的知识产权归甲方所有，乙方不得在任何情况下使用相关技术', '任何一方违约，应向守约方支付合同总金额的50%作为违约金'];
      const contractSamples = [
        { title: '设备采购合同', risk: '低风险', riskClass: 'low', key: 'procurement_low' },
        { title: '设备采购合同', risk: '高风险', riskClass: 'high', key: 'procurement_high' },
        { title: '劳动合同', risk: '中风险', riskClass: 'mid', key: 'employment' },
        { title: '房屋租赁合同', risk: '低风险', riskClass: 'low', key: 'lease' },
        { title: '技术服务合同', risk: '高风险', riskClass: 'high', key: 'tech_service' },
        { title: '工程施工合同', risk: '中风险', riskClass: 'mid', key: 'construction' },
      ];

      const embeddedContracts = {
        procurement_low: `信息化设备采购合同\\n\\n合同编号：CG-2026-0312\\n\\n甲方（采购方）：W市大数据管理中心\\n法定代表人：张某\\n地址：W市政务新区行政服务中心6楼\\n\\n乙方（供货方）：华信科技发展有限公司\\n法定代表人：李某\\n地址：S市高新区软件园B座12层\\n\\n根据《中华人民共和国政府采购法》《中华人民共和国民法典》及有关法律法规，甲乙双方经平等协商，就甲方采购信息化设备事宜达成如下协议：\\n\\n第一条 采购内容\\n甲方拟采购服务器10台、核心交换机2台、防火墙2台，具体品牌、型号、配置及单价详见附件一《设备清单及报价表》。合同总价为人民币玖拾陆万元整（¥960,000.00），含设备费、运输费、安装调试费及税费。\\n\\n第二条 交货与验收\\n1. 乙方应于合同签订后30个自然日内将全部设备送达甲方指定地点，并完成安装调试。\\n2. 甲方应在设备安装调试完成后7个工作日内组织验收，验收标准按附件一约定执行。\\n3. 验收不合格的，乙方应在10个工作日内免费更换或修复，由此产生的费用由乙方承担。\\n\\n第三条 付款方式\\n1. 合同签订后10个工作日内，甲方支付合同总价的30%即¥288,000.00作为预付款；\\n2. 全部设备验收合格后15个工作日内，甲方支付合同总价的60%即¥576,000.00；\\n3. 剩余10%即¥96,000.00作为质保金，质保期满且无质量问题后15个工作日内支付。\\n\\n第四条 质量保证与售后服务\\n1. 乙方保证所供设备为全新正品，符合国家及行业相关标准。\\n2. 全部设备质保期为3年，自验收合格之日起算。质保期内，乙方提供7×24小时技术支持，设备故障4小时内响应，48小时内修复或更换。\\n\\n第五条 违约责任\\n1. 乙方逾期交货的，每逾期一日按合同总价的0.05%向甲方支付违约金，逾期超过15日的，甲方有权解除合同，乙方应退还已收取的全部款项并支付合同总价10%的违约金。\\n2. 甲方逾期付款的，每逾期一日按应付未付金额的0.05%向乙方支付违约金。\\n\\n第六条 知识产权\\n1. 乙方保证所供设备及相关软件不侵犯任何第三方知识产权。如发生知识产权纠纷，由乙方负责处理并承担全部费用和赔偿责任。\\n2. 甲方因使用乙方设备产生的数据及应用成果的知识产权归甲方所有。\\n\\n第七条 保密条款\\n1. 双方对因履行本合同而知悉的对方商业秘密和技术秘密负有保密义务。\\n2. 保密期限为本合同终止后3年。\\n\\n第八条 争议解决\\因本合同引起的或与本合同有关的争议，双方应首先通过友好协商解决；协商不成的，任何一方均可向甲方所在地有管辖权的人民法院提起诉讼。\\n\\n甲方（盖章）：________        乙方（盖章）：________\\n签订日期：2026年3月12日`,

        procurement_high: `信息化设备采购合同\\n\\n合同编号：CG-2026-0407\\n\\n甲方（采购方）：N县政务服务中心\\n乙方（供货方）：鼎新数码科技有限公司\\n\\n甲乙双方经友好协商，就甲方采购信息化设备事宜达成如下协议：\\n\\n第一条 采购内容\\n甲方向乙方采购办公电脑及网络设备一批，合同总金额为人民币柒佰贰拾万元整（¥7,200,000.00）。\\n\\n第二条 交货\\n乙方应在合理时间内将设备交付甲方。具体交货时间由乙方根据生产进度确定，甲方予以配合。\\n\\n第三条 付款方式\\n合同签订后5个工作日内，甲方一次性支付合同全额即¥7,200,000.00。\\n\\n第四条 质量保证\\n1. 乙方保证设备符合出厂标准。\\n2. 质保期为1年，自交货之日起计算。\\n\\n第五条 违约责任\\n甲方未按约定付款的，每逾期一日按应付金额的1%向乙方支付违约金。逾期超过30日的，乙方有权收回设备，已收取款项不予退还。\\n\\n第六条 争议解决\\n因本合同产生的争议，提交乙方所在地仲裁委员会仲裁。\\n\\n第七条 其他\\n1. 本合同未尽事宜，由双方另行协商。\\n2. 甲方不得将本合同项下设备转让给第三方，否则乙方有权要求甲方支付合同总价20%的违约金。\\n\\n甲方（盖章）：________        乙方（盖章）：________\\n日期：2026年4月7日`,

        employment: `劳动合同\\n\\n甲方（用人单位）：东方数联信息技术有限公司\\n法定代表人：王某\\n注册地址：Z市经济技术开发区科技路88号\\n\\n乙方（劳动者）：赵某\\n身份证号：320XXXXXXXXXXXXXXX\\n\\n根据《中华人民共和国劳动法》《中华人民共和国劳动合同法》及相关法律法规，甲乙双方在平等自愿、协商一致的基础上签订本合同：\\n\\n第一条 合同期限\\n本合同为固定期限劳动合同，自2026年3月1日起至2029年2月28日止，其中试用期为6个月。\\n\\n第二条 工作内容与地点\\n1. 乙方同意在甲方研发部门担任高级工程师岗位，从事大数据平台开发工作。\\n2. 工作地点为甲方注册地及甲方项目所在地。甲方因业务需要可调整乙方工作地点，乙方应服从安排。\\n\\n第三条 工作时间与休息休假\\n1. 甲方实行标准工时制度，乙方每日工作8小时，每周工作40小时。\\n2. 因项目需要，乙方应配合甲方安排的加班，加班费按国家规定执行。\\n\\n第四条 劳动报酬\\n1. 乙方月工资为人民币壹万伍仟元整（¥15,000.00），其中基本工资¥6,000.00，绩效工资¥9,000.00。绩效工资根据甲方绩效考核制度及乙方考核结果发放。\\n2. 甲方于每月15日前支付上月工资。\\n\\n第五条 社会保险\\n甲方依法为乙方缴纳社会保险，缴费基数按当地最低缴费基数执行。\\n\\n第六条 竞业限制\\n1. 乙方离职后2年内，不得在与甲方生产或经营同类产品、从事同类业务的有竞争关系的单位任职，也不得自己经营同类业务。\\n2. 竞业限制补偿金为乙方离职前12个月平均工资的30%，按月支付。\\n\\n第七条 保密义务\\n1. 乙方对甲方的技术秘密、商业秘密负有保密义务。\\n2. 保密期限为乙方在职期间及离职后5年。\\n3. 乙方违反保密义务的，应向甲方支付违约金人民币贰拾万元整（¥200,000.00）。\\n\\n第八条 违约责任\\n1. 乙方在试用期内提出解除合同的，应提前3日通知甲方。\\n2. 乙方在合同期内主动离职的，应提前30日书面通知甲方，并支付甲方相当于3个月工资的培训补偿费。\\n3. 乙方违反竞业限制约定的，应向甲方支付违约金人民币伍拾万元整（¥500,000.00），并继续履行竞业限制义务。\\n\\n第九条 争议解决\\n因本合同产生的争议，双方协商解决；协商不成的，向甲方所在地劳动争议仲裁委员会申请仲裁。\\n\\n甲方（盖章）：________        乙方签字：________\\n签订日期：2026年3月1日`,

        lease: `房屋租赁合同\\n\\n出租方（甲方）：锦绣商务物业管理（杭州）有限公司\\n法定代表人：陈某\\n地址：杭州市余杭区仓前街道海创科技中心1号楼\\n\\n承租方（乙方）：云启智能科技有限公司\\n法定代表人：范某\\n\\n根据《中华人民共和国民法典》及相关法律法规，甲乙双方就房屋租赁事宜达成如下协议：\\n\\n第一条 租赁物基本情况\\n1. 甲方将位于杭州市余杭区仓前街道海创科技中心1号楼801-803室，建筑面积450平方米的商业办公用房出租给乙方。\\n2. 甲方保证对上述房屋拥有合法出租权，房屋权属清晰，不存在抵押、查封等影响乙方正常使用的权利瑕疵。\\n\\n第二条 租赁期限\\n1. 租赁期限为3年，自2026年4月1日起至2029年3月31日止。\\n2. 免租装修期为2个月（2026年4月1日至2026年5月31日），免租期间免收租金，但乙方应承担水电物业等实际使用费用。\\n\\n第三条 租金及支付\\n1. 月租金为人民币肆万伍仟元整（¥45,000.00），含物业管理费。\\n2. 租金每两年递增5%。\\n3. 租金按季度支付，每季首月5日前支付当季租金。\\n4. 押金为两个月租金即¥90,000.00，于合同签订时支付。租赁期满且乙方无违约情形的，甲方在7个工作日内无息退还押金。\\n\\n第四条 甲方权利义务\\n1. 按约定交付房屋，确保房屋建筑结构安全，供水供电及空调系统正常运行。\\n2. 负责房屋主体结构及公共区域的维修保养。\\n3. 不得在租赁期内擅自收回房屋或提高租金。\\n\\n第五条 乙方权利义务\\n1. 按约定用途使用房屋，不得从事违法经营活动。\\n2. 不得擅自转租、分租或改变房屋主体结构。\\n3. 按时支付租金及相关费用。\\n\\n第六条 违约责任\\n1. 乙方逾期支付租金超过15日的，甲方有权解除合同，乙方应支付相当于2个月租金的违约金。\\n2. 甲方未按约定交付房屋或擅自收回房屋的，应退还乙方已付未使用的租金，并支付相当于2个月租金的违约金。\\n3. 任何一方提前终止合同（非违约原因），须提前60日书面通知对方，并支付相当于1个月租金的补偿金。\\n\\n第七条 续租\\租赁期满乙方需续租的，应提前60日书面通知甲方。同等条件下，乙方享有优先承租权。\\n\\n第八条 争议解决\\因本合同引起的争议，双方应友好协商解决；协商不成的，向房屋所在地人民法院提起诉讼。\\n\\n甲方（盖章）：________        乙方（盖章）：________\\n签订日期：2026年3月20日`,

        tech_service: `技术服务合同\\n\\n甲方（委托方）：金城水务集团有限公司\\n法定代表人：杜某\\n地址：J市滨河路168号水务大厦\\n\\n乙方（受托方）：捷讯软件技术有限公司\\n法定代表人：马某\\n地址：S市浦东新区张江高科技园区\\n\\n甲乙双方就甲方智慧水务平台建设项目协商一致，签订本合同：\\n\\n第一条 服务内容\\n乙方为甲方提供智慧水务平台的设计、开发、部署及运维服务，包括：物联网数据采集系统、管网GIS分析系统、漏损智能分析系统、移动巡查应用。\\n\\n第二条 服务费用\\n合同总金额为人民币肆佰捌拾万元整（¥4,800,000.00）。\\n\\n第三条 付款方式\\n1. 合同签订后5个工作日内，甲方支付合同总金额的70%即¥3,360,000.00作为预付款。\\n2. 系统上线运行后支付20%即¥960,000.00。\\n3. 验收合格后支付10%即¥480,000.00。\\n\\n第四条 知识产权\\n1. 乙方因履行本合同产生的全部技术成果（包括但不限于源代码、文档、数据模型、算法等）的知识产权归乙方所有。\\n2. 甲方获得上述成果的永久使用权，但不得转让、许可第三方使用或进行反向工程。\\n3. 乙方有权将本项目中形成的技术方案和经验用于其他项目。\\n\\n第五条 保密条款\\双方对项目相关信息负有保密义务，保密期限为本合同终止后1年。\\n\\n第六条 项目进度\\1. 乙方应在合同签订后6个月内完成系统开发和部署。\\n2. 因甲方原因导致项目延期的，工期顺延，顺延期间甲方应按日支付¥5,000的待工补偿费。\\n\\n第七条 验收\\1. 系统上线运行30日后，甲方应组织验收。\\n2. 甲方在系统上线后60日内未书面提出验收意见的，视为验收合格。\\n\\n第八条 违约责任\\n1. 乙方未按期完成开发和部署的，每逾期一日按合同总金额的0.1%支付违约金。\\n2. 甲方未按约定付款的，乙方有权暂停服务直至收到款项，由此造成的工期延误不构成乙方违约。\\n\\n第九条 争议解决\\n因本合同引起的争议，提交S仲裁委员会仲裁。\\n\\n甲方（盖章）：________        乙方（盖章）：________\\n签订日期：2026年2月15日`,

        construction: `建设工程施工合同\\n\\n发包人（甲方）：X县住房和城乡建设局\\n法定代表人：何某\\n\\n承包人（乙方）：鼎盛建筑工程有限公司\\n法定代表人：刘某\\n\\n根据《中华人民共和国民法典》《中华人民共和国建筑法》及有关法律法规，甲乙双方就X县老旧小区改造工程协商一致，订立本合同：\\n\\n第一条 工程概况\\n1. 工程名称：X县2026年老旧小区综合改造提升项目\\n2. 工程地点：X县城关镇老旧小区\\n3. 工程内容：建筑外立面翻新、屋面防水改造、给排水管网更新、道路硬化及绿化、公共照明及监控安装\\n4. 承包方式：包工包料\\n\\n第二条 合同价款\\n1. 合同暂定总价为人民币贰仟叁佰伍拾万元整（¥23,500,000.00），最终结算价按审计审定金额为准。\\n2. 合同价款采用可调价格方式，人工费按当地造价管理部门发布的调价文件调整，材料价格波动超过5%时据实调整。\\n\\n第三条 工期\\n1. 计划开工日期：2026年4月1日\\n2. 计划竣工日期：2026年12月31日\\n3. 总工期270日历天\\n\\n第四条 质量标准\\n工程质量应符合《建筑工程施工质量验收统一标准》（GB50300-2013）及国家现行施工验收规范的合格标准。\\n\\n第五条 付款方式\\n1. 按月进度支付，每月25日乙方提交工程进度报告，甲方审核后14日内支付已完成工程量的70%。\\n2. 工程竣工验收合格后支付至合同总价的80%。\\n3. 审计审定后30日内支付至审定金额的97%。\\n4. 剩余3%作为质量保修金，保修期满后30日内无息退还。\\n\\n第六条 安全生产\\n1. 乙方应严格遵守安全生产法律法规，制定施工安全方案并报甲方备案。\\n2. 施工过程中发生安全事故的，一切责任和损失由乙方承担。\\n\\n第七条 变更与签证\\n1. 工程变更须经甲方书面确认，未经甲方确认的变更不予计量支付。\\n2. 现场签证须在事件发生后7日内由甲方现场代表签字确认，逾期不予认可。\\n\\n第八条 违约责任\\n1. 乙方逾期竣工的，每逾期一日按合同总价0.05%支付违约金，违约金上限为合同总价的5%。\\n2. 甲方未按约定支付工程款的，应按银行同期贷款利率向乙方支付利息。\\n\\n第九条 保修\\n1. 地基基础工程和主体结构工程保修期为设计文件规定的合理使用年限。\\n2. 屋面防水工程、外墙防渗漏保修期为5年。\\n3. 装修工程、管道安装工程保修期为2年。\\n\\n第十条 争议解决\\n因本合同引起的争议，双方协商解决；协商不成的，向工程所在地人民法院提起诉讼。\\n\\n甲方（盖章）：________        乙方（盖章）：________\\n签订日期：2026年3月10日`,
      };

      function scrollToBottom() {
        nextTick(() => {
          if (messagesContainer.value) {
            messagesContainer.value.scrollTop = messagesContainer.value.scrollHeight;
          }
        });
      }

      function useQuick(q) {
        inputText.value = q;
        sendMessage();
      }

      function loadSample(sample) {
        const text = embeddedContracts[sample.key];
        if (text) {
          inputText.value = text;
        } else {
          inputText.value = '（合同内容加载失败，请手动粘贴合同文本）';
        }
      }

      function formatMessage(msg) {
        if (msg.isObject) {
          let html = '<div class="structured-result">';
          const renderVal = (val) => {
            if (typeof val === 'object' && val !== null) {
              return '<span class="field-value">' + JSON.stringify(val, null, 2).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</span>';
            }
            let t = String(val).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
            t = t.replace(/\n/g, '<br>');
            return '<span class="field-value">' + t + '</span>';
          };
          if (typeof msg.content === 'object' && msg.content !== null && !Array.isArray(msg.content)) {
            const labelMap = {
              overall_risk_level: '整体风险等级',
              risk_items: '风险条款',
              missing_clauses: '缺失条款',
              recommendations: '审查建议',
              summary: '审查总结',
            };
            for (const [key, val] of Object.entries(msg.content)) {
              const label = labelMap[key] || key;
              html += '<div class="result-item"><span class="item-num">' + label + '</span>' + renderVal(val) + '</div>';
            }
          }
          html += '</div>';
          return html;
        }
        let text = String(msg.content);
        text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
        text = text.replace(/\n/g, '<br>');
        return text;
      }

      async function checkHealth() {
        try {
          const res = await fetch(`${API_BASE}/health`);
          const data = await res.json();
          apiHealthy.value = data.status === 'ok';
        } catch {
          apiHealthy.value = false;
        }
      }

      async function sendMessage() {
        const text = inputText.value.trim();
        if (!text || loading.value) return;
        messages.value.push({ role: 'user', content: text });
        inputText.value = '';
        loading.value = true;
        scrollToBottom();

        try {
          const res = await fetch(`${API_BASE}/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: text }),
          });
          const data = await res.json();
          if (!res.ok) {
            const errMsg = data.detail || data.error || `服务错误（${res.status}）`;
            messages.value.push({ role: 'assistant', content: errMsg, isObject: false });
          } else if (data.error) {
            messages.value.push({ role: 'assistant', content: data.error, isObject: false });
          } else {
            const isObj = typeof data.answer === 'object' && data.answer !== null;
            messages.value.push({ role: 'assistant', content: isObj ? data.answer : String(data.answer ?? ''), isObject: isObj });
          }
        } catch (e) {
          messages.value.push({ role: 'assistant', content: `请求失败：${e.message}`, isObject: false });
        }

        loading.value = false;
        scrollToBottom();
      }

      onMounted(async () => {
        await checkHealth();
      });

      return {
        messages, inputText, loading, apiHealthy, messagesContainer,
        quickQuestions, contractSamples,
        useQuick, loadSample, sendMessage, formatMessage,
      };
    }
  }).mount('#app');
  </script>
